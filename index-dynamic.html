<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊朗以色列冲突时间线 | Iran-Israel Conflict Timeline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #e94560;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        /* Loading indicator */
        #loading {
            text-align: center;
            padding: 40px;
            color: #4ecca3;
            font-size: 1.2em;
        }
        
        .spinner {
            border: 4px solid rgba(78, 204, 163, 0.1);
            border-top: 4px solid #4ecca3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Filter bar */
        .filter-bar {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .filter-label {
            color: #a0a0a0;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #e94560;
            border-radius: 20px;
            padding: 10px 20px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: rgba(233, 69, 96, 0.3);
            transform: translateY(-2px);
        }
        
        .filter-btn.all {
            background: rgba(78, 204, 163, 0.2);
            border-color: #4ecca3;
        }
        
        .filter-btn.all:hover, .filter-btn.all.active {
            background: rgba(78, 204, 163, 0.4);
        }
        
        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .stat-title {
            color: #a0a0a0;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4ecca3;
        }
        
        .stat-value.critical {
            color: #e94560;
        }
        
        .stat-subtitle {
            color: #808080;
            font-size: 0.8em;
        }
        
        /* Date groups */
        .date-group {
            margin-bottom: 60px;
            display: none;
        }
        
        .date-group.active {
            display: block;
        }
        
        .date-header {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2) 0%, rgba(78, 204, 163, 0.2) 100%);
            border: 2px solid #e94560;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .date-title {
            font-size: 1.8em;
            color: #e94560;
            margin-bottom: 5px;
        }
        
        .date-summary {
            color: #a0a0a0;
            font-size: 1em;
        }
        
        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #e94560 0%, #4ecca3 100%);
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            padding-left: 25px;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -39px;
            top: 5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4ecca3;
            border: 4px solid #1a1a2e;
            transition: all 0.3s;
            z-index: 1;
        }
        
        .timeline-item.critical::before {
            background: #e94560;
            box-shadow: 0 0 15px #e94560;
        }
        
        .timeline-item:hover::before {
            transform: scale(1.4);
        }
        
        .timeline-time {
            color: #4ecca3;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }
        
        .timeline-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 18px;
            border-left: 4px solid #4ecca3;
            transition: all 0.3s;
        }
        
        .timeline-content.critical {
            border-left-color: #e94560;
            background: rgba(233, 69, 96, 0.15);
        }
        
        .timeline-content:hover {
            transform: translateX(8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .timeline-title {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: bold;
        }
        
        .timeline-details {
            color: #b0b0b0;
            font-size: 0.95em;
            line-height: 1.8;
        }
        
        .timeline-source {
            color: #808080;
            font-size: 0.8em;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .source-link {
            color: #4ecca3;
            text-decoration: none;
            border-bottom: 1px dashed #4ecca3;
            transition: all 0.3s;
        }
        
        .source-link:hover {
            color: #e94560;
            border-bottom-color: #e94560;
        }
        
        .source-links {
            margin-top: 8px;
        }
        
        .source-link-item {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 5px;
        }
        
        .event-tag {
            display: inline-block;
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 0.75em;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        .event-tag.critical {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
        }
        
        .event-tag.warning {
            background: rgba(255, 193, 7, 0.2);
            border-color: #ffc107;
        }
        
        .last-updated {
            text-align: center;
            color: #808080;
            margin-top: 60px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .refresh-badge {
            display: inline-block;
            background: #4ecca3;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            margin-left: 10px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #e94560;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .filter-buttons {
                flex-direction: column;
            }
            
            .date-title {
                font-size: 1.4em;
            }
            
            .source-link-item {
                display: block;
                margin-right: 0;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="live-indicator"></span>伊朗以色列冲突时间线</h1>
            <p class="subtitle">Iran-Israel Conflict Timeline | 按日期分组的事件脉络</p>
        </header>
        
        <!-- Loading indicator -->
        <div id="loading">
            <div class="spinner"></div>
            <p>正在加载最新数据...</p>
        </div>
        
        <!-- Main content (hidden until data loaded) -->
        <div id="main-content" style="display: none;">
            <div class="filter-bar">
                <div class="filter-label">📅 选择查看日期</div>
                <div class="filter-buttons" id="filter-buttons">
                    <button class="filter-btn all active" data-date="all">查看全部</button>
                    <!-- Dates will be dynamically inserted here -->
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">📅 持续时间</div>
                    <div class="stat-value" id="stat-duration">-</div>
                    <div class="stat-subtitle" id="stat-duration-sub">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">🚀 导弹发射</div>
                    <div class="stat-value" id="stat-missiles">-</div>
                    <div class="stat-subtitle">自冲突开始</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">🛸 无人机攻击</div>
                    <div class="stat-value" id="stat-drones">-</div>
                    <div class="stat-subtitle">自冲突开始</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">😔 平民死亡</div>
                    <div class="stat-value critical" id="stat-deaths">-</div>
                    <div class="stat-subtitle" id="stat-deaths-sub">-</div>
                </div>
            </div>
            
            <div id="timeline-container">
                <!-- Timeline events will be dynamically inserted here -->
            </div>
            
            <div class="last-updated">
                <p>最后更新: <span id="last-update-time"></span> <span class="refresh-badge">自动更新中</span></p>
                <p style="margin-top: 15px; font-size: 0.9em; color: #4ecca3;">
                    ✅ 按日期分组的事件脉络<br>
                    • 点击顶部按钮筛选日期，或"查看全部"看完整时间线<br>
                    • 点击"📰 链接"查看原始新闻报道<br>
                    • 所有事件均标注来源，支持跳转查看详情<br>
                    • 数据从 JSON 动态加载,支持自动化更新<br>
                    • 页面每5分钟自动刷新以获取最新内容
                </p>
            </div>
        </div>
    </div>
    
    <script>
        // Global data storage
        let conflictData = null;
        let currentFilter = 'all';
        
        // Load data from JSON
        async function loadData() {
            try {
                const response = await fetch('data/events.json?' + new Date().getTime());
                if (!response.ok) throw new Error('Failed to load data');
                conflictData = await response.json();
                renderPage();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').innerHTML = `
                    <p style="color: #e94560;">❌ 数据加载失败</p>
                    <p style="font-size: 0.9em; margin-top: 10px;">${error.message}</p>
                `;
            }
        }
        
        // Render the entire page
        function renderPage() {
            // Hide loading, show content
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Update stats
            updateStats();
            
            // Generate filter buttons
            generateFilterButtons();
            
            // Render timeline
            renderTimeline();
            
            // Update time
            updateTime();
            setInterval(updateTime, 60000);
            
            // Auto-refresh
            setTimeout(() => {
                location.reload();
            }, 5 * 60 * 1000);
        }
        
        // Update statistics
        function updateStats() {
            const stats = conflictData.stats;
            document.getElementById('stat-duration').textContent = stats.duration_days + '天';
            document.getElementById('stat-duration-sub').textContent = conflictData.metadata.confflict_start + ' 至今';
            document.getElementById('stat-missiles').textContent = stats.missiles_launched;
            document.getElementById('stat-drones').textContent = stats.drone_attacks;
            document.getElementById('stat-deaths').textContent = stats.civilian_deaths;
            document.getElementById('stat-deaths-sub').textContent = '持续更新中';
        }
        
        // Generate filter buttons
        function generateFilterButtons() {
            const container = document.getElementById('filter-buttons');
            
            // Get unique dates
            const dates = [...new Set(conflictData.events.map(e => e.date))].sort().reverse();
            
            // Clear existing buttons (except "all")
            const allBtn = container.querySelector('.filter-btn.all');
            container.innerHTML = '';
            container.appendChild(allBtn);
            
            // Add date buttons
            dates.forEach(date => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-date', date);
                btn.textContent = date;
                btn.addEventListener('click', () => filterByDate(date));
                container.appendChild(btn);
            });
            
            // Bind "all" button
            allBtn.addEventListener('click', () => filterByDate('all'));
            
            // Auto-select current date
            autoSelectCurrentDate(dates);
        }
        
        // Auto-select current date
        function autoSelectCurrentDate(availableDates) {
            const today = new Date().toISOString().split('T')[0];
            
            if (availableDates.includes(today)) {
                filterByDate(today);
            } else if (availableDates.length > 0) {
                filterByDate(availableDates[0]); // Latest date
            } else {
                filterByDate('all');
            }
        }
        
        // Filter by date
        function filterByDate(date) {
            currentFilter = date;
            
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-date') === date) {
                    btn.classList.add('active');
                }
            });
            
            // Re-render timeline
            renderTimeline();
        }
        
        // Render timeline
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            
            // Filter events
            let filteredEvents = conflictData.events;
            if (currentFilter !== 'all') {
                filteredEvents = conflictData.events.filter(e => e.date === currentFilter);
            }
            
            // Group by date
            const grouped = {};
            filteredEvents.forEach(event => {
                if (!grouped[event.date]) {
                    grouped[event.date] = [];
                }
                grouped[event.date].push(event);
            });
            
            // Sort dates
            const sortedDates = Object.keys(grouped).sort().reverse();
            
            // Render each date group
            sortedDates.forEach(date => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'date-group active';
                
                const header = document.createElement('div');
                header.className = 'date-header';
                header.innerHTML = `
                    <div class="date-title">📅 ${date}</div>
                    <div class="date-summary">${grouped[date].length} 个事件</div>
                `;
                groupDiv.appendChild(header);
                
                const timeline = document.createElement('div');
                timeline.className = 'timeline';
                
                grouped[date].forEach(event => {
                    const item = createTimelineItem(event);
                    timeline.appendChild(item);
                });
                
                groupDiv.appendChild(timeline);
                container.appendChild(groupDiv);
            });
        }
        
        // Create timeline item
        function createTimelineItem(event) {
            const item = document.createElement('div');
            item.className = 'timeline-item' + (event.critical ? ' critical' : '');
            
            const tags = event.tags.map(tag => 
                `<span class="event-tag${event.critical ? ' critical' : ''}">${tag}</span>`
            ).join('');
            
            const sources = event.sources.map(source => 
                `<span class="source-link-item">📰 <a href="${source.url}" class="source-link" target="_blank">${source.name}</a></span>`
            ).join('');
            
            item.innerHTML = `
                <div class="timeline-content${event.critical ? ' critical' : ''}">
                    <div class="timeline-time">${event.time}</div>
                    <div class="timeline-title">${event.title}</div>
                    <div class="timeline-details">
                        ${tags}<br>
                        ${event.details.replace(/\n/g, '<br>')}
                    </div>
                    <div class="timeline-source">
                        <div class="source-links">${sources}</div>
                    </div>
                </div>
            `;
            
            return item;
        }
        
        // Update time display
        function updateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Shanghai'
            };
            
            const timeEl = document.getElementById('last-update-time');
            if (timeEl) {
                timeEl.textContent = now.toLocaleString('zh-CN', options);
            }
        }
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
